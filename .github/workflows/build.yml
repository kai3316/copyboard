name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: copyboard-windows
          - os: macos-latest
            artifact: copyboard-macos
          - os: ubuntu-latest
            artifact: copyboard-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxcb1 xclip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller copyboard.spec

      - name: Diagnose macOS bundle
        if: runner.os == 'macOS'
        run: |
          echo "=== Python version ==="
          python --version
          echo ""
          echo "=== Bundle contents ==="
          ls -la dist/copyboard.app/Contents/MacOS/
          echo ""
          echo "=== Linked libraries ==="
          otool -L dist/copyboard.app/Contents/MacOS/copyboard 2>&1 || true
          echo ""
          echo "=== Frameworks in bundle ==="
          find dist/copyboard.app -name "*.dylib" -o -name "*.framework" | head -30
          echo ""
          echo "=== Smoke test (capture startup errors) ==="
          timeout 5 dist/copyboard.app/Contents/MacOS/copyboard 2>&1 || true
          echo ""
          echo "=== Crash logs ==="
          ls -la ~/Library/Logs/DiagnosticReports/ 2>/dev/null | grep -i copyboard || true
          echo ""
          echo "=== App logs ==="
          cat ~/Library/Logs/CopyBoard/copyboard.log 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: copyboard-windows
          path: dist/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: copyboard-macos
          path: dist/macos

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: copyboard-linux
          path: dist/linux

      - name: Zip platform builds
        run: |
          cd dist/windows && zip -r ../../copyboard-windows.zip * && cd ../..
          cd dist/macos    && zip -r ../../copyboard-macos.zip *   && cd ../..
          cd dist/linux    && tar -czf ../../copyboard-linux.tar.gz * && cd ../..

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "CopyBoard ${{ github.ref_name }}" \
            --notes "Automated build for ${{ github.ref_name }}.
            - \`copyboard-windows.zip\` — Windows \`.exe\`
            - \`copyboard-macos.zip\` — macOS \`.app\` bundle
            - \`copyboard-linux.tar.gz\` — Linux binary" \
            copyboard-windows.zip \
            copyboard-macos.zip \
            copyboard-linux.tar.gz
