name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: copyboard-windows
          - os: macos-latest
            artifact: copyboard-macos
          - os: ubuntu-latest
            artifact: copyboard-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxcb1 xclip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller copyboard.spec

      - name: Package for release (preserve symlinks)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            # ditto preserves .app bundle symlinks (plain zip does not)
            ditto -c -k --sequesterRsrc --keepParent dist/copyboard.app copyboard-macos.zip
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cd dist && zip -r ../copyboard-windows.zip *
          else
            cd dist && tar -czf ../copyboard-linux.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: copyboard-*.*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: copyboard-windows
          path: dist

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: copyboard-macos
          path: dist

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: copyboard-linux
          path: dist

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "CopyBoard ${{ github.ref_name }}" \
            --notes "Automated build for ${{ github.ref_name }}.
            - \`copyboard-windows.zip\` — Windows \`.exe\`
            - \`copyboard-macos.zip\` — macOS \`.app\` bundle
            - \`copyboard-linux.tar.gz\` — Linux binary" \
            dist/copyboard-windows.zip \
            dist/copyboard-macos.zip \
            dist/copyboard-linux.tar.gz
